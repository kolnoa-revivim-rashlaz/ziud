<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>טופס השאלת ציוד – מגמת קולנוע רביבים</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --bg-color: #f3f4f6;
            --surface: #ffffff;
            --text-main: #1f2937;
            --text-light: #6b7280;
            --border: #e5e7eb;
            --accent-light: #f0f4ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Rubik', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
        }

        .container {
            max-width: 950px;
            width: 100%;
            background: var(--surface);
            border-radius: 16px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.08);
            padding: 35px 40px;
            border-top: 8px solid var(--primary);
            margin: 10px 0;
        }

        .header-section {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        .header-section h1 {
            color: var(--primary);
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
        }

        .header-section h2 {
            color: var(--text-light);
            font-size: 18px;
            font-weight: 400;
        }

        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        .flex-col {
            flex: 1;
            min-width: 260px;
            background: #f9fafb;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: 0.2s;
        }

        .section-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 18px;
            border-bottom: 2px solid var(--secondary);
            display: inline-block;
            padding-bottom: 6px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--text-main);
        }

        input[type="text"],
        input[type="tel"],
        input[type="email"],
        input[type="datetime-local"],
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'Rubik', sans-serif;
            font-size: 14px;
            background-color: white;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .equipment-category {
            margin-bottom: 24px;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            background: #ffffff;
        }

        .category-header {
            background: var(--primary);
            color: white;
            padding: 10px 18px;
            font-weight: 600;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
            padding: 18px;
            background: #fdfdfd;
        }

        .equip-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            background: white;
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #f0f0f0;
        }

        .equip-item input[type="checkbox"] {
            width: 17px;
            height: 17px;
            cursor: pointer;
            accent-color: var(--primary);
            flex-shrink: 0;
        }

        .equip-item label {
            margin-bottom: 0;
            font-weight: 400;
            cursor: pointer;
            flex: 1;
        }

        .qty-input {
            width: 55px;
            padding: 6px 4px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 13px;
            text-align: center;
            margin-left: 4px;
            background: #f9fafb;
        }

        .inline-group {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .sub-option {
            margin-top: 8px;
            padding-right: 20px;
            border-right: 2px solid var(--secondary);
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
            grid-column: 1 / -1;
        }

        .btn-export {
            display: block;
            width: 100%;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 16px;
            font-size: 17px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 25px;
            transition: background 0.25s, transform 0.1s;
            letter-spacing: 0.3px;
        }

        .btn-export:hover {
            background: #1e40af;
            transform: scale(1.01);
        }

        hr {
            margin: 20px 0 15px;
            border: 0;
            border-top: 1px solid var(--border);
        }

        .note {
            font-size: 13px;
            color: #4b5563;
            background: #f3f4f6;
            padding: 8px 12px;
            border-radius: 6px;
        }

        @media print {
            body { padding: 0; background: white; }
            .container { box-shadow: none; border: none; padding: 15px; max-width: 100%; }
            .btn-export { display: none !important; }
            input, select, .qty-input { border: 1px solid #ccc; background: white; color: black; }
        }

        @media (max-width: 600px) {
            .container { padding: 20px; }
            .equipment-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="container" id="pdf-content">
        
        <div class="header-section">
            <h1>טופס הזמנת ציוד</h1>
            <h2>מגמת קולנוע רביבים | תשפ״ו 2026</h2>
        </div>

        <!-- פרטי מפיק ותאריכים -->
        <div class="flex-row">
            <div class="flex-col">
                <div class="section-title">פרטי ההפקה</div>
                <div class="form-group">
                    <label>שם מלא (מפיק/אחראי ציוד):</label>
                    <input type="text" placeholder="הקלד שם מלא">
                </div>
                <div class="form-group">
                    <label>כיתה:</label>
                    <select>
                        <option value="" disabled selected>בחר/י כיתה...</option>
                        <option value="י">י'</option>
                        <option value="יא">י״א</option>
                        <option value="יב">י״ב</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>טלפון ליצירת קשר:</label>
                    <input type="tel" placeholder="05X-XXXXXXX">
                </div>
            </div>

            <div class="flex-col">
                <div class="section-title">מועדי שאלה</div>
                <div class="form-group">
                    <label>תאריך ושעת איסוף:</label>
                    <input type="datetime-local">
                </div>
                <div class="form-group">
                    <label>תאריך ושעת החזרה:</label>
                    <input type="datetime-local">
                </div>
                <div class="note">
                    <strong>צוות אחראי:</strong> מיכאל 054-7798676 | גוש עציון 23, ראשל״צ
                </div>
            </div>
        </div>

        <!-- מצלמות ועדשות -->
        <div class="equipment-category">
            <div class="category-header">📷 מצלמות ועדשות סוני</div>
            <div class="equipment-grid">
                <div class="equip-item"><input type="checkbox" id="cam_s3"><label for="cam_s3">מצלמת סוני S3</label></div>
                <div class="equip-item"><input type="checkbox" id="cam_r3"><label for="cam_r3">מצלמת סוני R3</label></div>
                <div class="equip-item"><input type="checkbox" id="cage"><label for="cage">כלוב (+מפתח)</label></div>
                <div class="equip-item"><input type="checkbox" id="cards"><label for="cards">כרטיסי זיכרון (2)</label>
                <input type="number" class="qty-input" placeholder="כמות" min="0" value="0" style="width:55px;">
                </div>
                <div class="equip-item">
                    <input type="checkbox" id="sony_bat"><label for="sony_bat">סוללות סוני</label>
                    <input type="number" class="qty-input" placeholder="כמות" min="0" value="0" style="width:55px;">
                </div>
                <div class="equip-item"><input type="checkbox" id="charger"><label for="charger">מטען סוני</label></div>
                <div class="equip-item"><input type="checkbox" id="lens2470"><label for="lens2470">עדשה 24-70</label></div>
                <div class="equip-item"><input type="checkbox" id="lens2860"><label for="lens2860">עדשה 28-70</label></div>
                <div class="equip-item"><input type="checkbox" id="lens50"><label for="lens50">עדשה 50</label></div>
                <div class="equip-item"><input type="checkbox" id="lens70180"><label for="lens70180">עדשה 70-180</label></div>
                <div class="equip-item"><input type="checkbox" id="filter"><label for="filter">פילטר ND/UV</label></div>
            </div>
        </div>

        <!-- סאונד (עם בחירת תיק גדול/קטן ותוספות) -->
        <div class="equipment-category">
            <div class="category-header">🎙️ סאונד והקלטה</div>
            <div class="equipment-grid">
                <div class="equip-item"><input type="checkbox" id="zoom"><label for="zoom">מכשיר ZOOM H5/H4</label></div>
                
                <!-- תיק סאונד גדול או קטן -->
                <div class="equip-item" style="grid-column: span 2;">
                    <input type="checkbox" id="sound_bag_select"><label for="sound_bag_select">תיק סאונד</label>
                    <select style="width: auto; margin-right: 8px;" id="sound_bag_type">
                        <option value="large">גדול</option>
                        <option value="small">קטן</option>
                    </select>
                </div>

                <div class="equip-item"><input type="checkbox" id="condenser"><label for="condenser">מיקרופון קונדנסר</label></div>
                <div class="equip-item"><input type="checkbox" id="boom"><label for="boom">מקל בום</label></div>
                <div class="equip-item"><input type="checkbox" id="zepelin"><label for="zepelin">פיש (זפלין)</label></div>
                <div class="equip-item"><input type="checkbox" id="deadcat"><label for="deadcat">כיסוי שפן/רוח</label></div>
                <div class="equip-item">
                    <input type="checkbox" id="xlr_cable"><label for="xlr_cable">כבל XLR</label>
                    <input type="number" class="qty-input" placeholder="כמות" min="0" value="0">
                </div>
                <div class="equip-item"><input type="checkbox" id="headphones"><label for="headphones">אוזניות</label></div>
                
                <!-- אפשרות לתוספת סט מיקרופון/כבל/אוזניות נוסף -->
                <div class="sub-option">
                    <div class="equip-item" style="border:0; padding:0;">
                        <input type="checkbox" id="extra_mic_set"><label for="extra_mic_set" style="font-weight:500;">➕ סט מיקרופון נוסף (קונדנסר/כבל/אוזניות)</label>
                    </div>
                </div>
            </div>
        </div>

        <!-- תאורה (כולל בחירת לד ישן/חדש, ג'לטינים מופרדים, כתיבת בטריות) -->
        <div class="equipment-category">
            <div class="category-header">💡 תאורה ומוניטורים</div>
            <div class="equipment-grid">
                <div class="equip-item"><input type="checkbox" id="monitor_small"><label for="monitor_small">מוניטור קטן + זרוע</label></div>
                <div class="equip-item"><input type="checkbox" id="monitor_big"><label for="monitor_big">מוניטור גדול בקייס</label></div>
                
                <!-- תאורת לד עם בחירה גדולה/ישנה -->
                <div class="equip-item" style="grid-column: span 2;">
                    <input type="checkbox" id="led_light"><label for="led_light">מזוודת/תיק לד</label>
                    <select style="width: auto; margin-right: 6px;" id="led_type">
                        <option value="big_new">גדול (חדש)</option>
                        <option value="big_old">גדול ישן</option>
                        <option value="medium">בינוני</option>
                        <option value="small">קטן</option>
                    </select>
                </div>

                <div class="equip-item">
                    <input type="checkbox" id="light_batteries"><label for="light_batteries">בטריות לתאורה</label>
                    <input type="number" class="qty-input" placeholder="כמות" min="0" value="0">
                </div>
                <div class="equip-item"><input type="checkbox" id="tungsten"><label for="tungsten">תאורת חשמל (תפוז/טוויני)</label></div>

                <!-- ג'לטינים מופרדים לפי דרישה -->
                <div class="equip-item"><input type="checkbox" id="gel_orange"><label for="gel_orange">תיק ג'לטינים כתום + תנינים</label></div>
                <div class="equip-item"><input type="checkbox" id="gel_color"><label for="gel_color">תיק ג'לטינים צבעוני + תנינים</label></div>
                
                <!-- תיקי תאורה בינוני/גדול עם אפשרות כמות -->
                <div class="equip-item">
                    <input type="checkbox" id="bag_medium"><label for="bag_medium">תיק לד בינוני</label>
                    <input type="number" class="qty-input" placeholder="כמות" min="0" value="0" style="width:55px;">
                </div>
                <div class="equip-item">
                    <input type="checkbox" id="bag_large"><label for="bag_large">תיק לד גדול</label>
                    <input type="number" class="qty-input" placeholder="כמות" min="0" value="0" style="width:55px;">
                </div>
            </div>
        </div>

        <!-- חצובות, אחיזה, גריפ -->
        <div class="equipment-category">
            <div class="category-header">🔧 חצובות, אחיזה וגריפ</div>
            <div class="equipment-grid">
                <div class="equip-item"><input type="checkbox" id="tripod_cam"><label for="tripod_cam">חצובת מצלמה</label></div>
                <div class="equip-item"><input type="checkbox" id="tripod_light"><label for="tripod_light">חצובת תאורה</label></div>
                <div class="equip-item"><input type="checkbox" id="softstand"><label for="softstand">סטנד ריכוך</label></div>
                <div class="equip-item"><input type="checkbox" id="grip_stands"><label for="grip_stands">גריפ סטנדס</label></div>
                <div class="equip-item"><input type="checkbox" id="shoulder"><label for="shoulder">תיק מכתוף</label></div>
                <div class="equip-item"><input type="checkbox" id="gimbal"><label for="gimbal">גימבל מלא</label></div>
                <div class="equip-item"><input type="checkbox" id="dolly"><label for="dolly">דולי + פסים/קושרת</label></div>
                <div class="equip-item"><input type="checkbox" id="extension"><label for="extension">כבל מאריך/תוף</label></div>
                <div class="equip-item"><input type="checkbox" id="clamp"><label for="clamp">קלפ צילום</label></div>
            </div>
        </div>

        <!-- הערות (שדה חופשי) -->
        <div class="flex-row" style="margin-top: 10px;">
            <div class="flex-col" style="flex:1;">
                <div class="form-group">
                    <label>הערות נוספות / בקשות מיוחדות:</label>
                    <input type="text" placeholder="לדוגמה: עדשה נוספת, כבל מיוחד...">
                </div>
            </div>
        </div>

        <button class="btn-export" id="btnExport" onclick="downloadPDF()">📥 יצוא ושמירה כ-PDF</button>
    </div>

    <script>
        function downloadPDF() {
            const element = document.getElementById('pdf-content');
            const btn = document.getElementById('btnExport');
            
            btn.style.display = 'none';

            const opt = {
                margin:       [8, 8, 12, 8],
                filename:     'טופס_הזמנת_ציוד_רביבים.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { 
                    scale: 2.2, 
                    useCORS: true,
                    scrollY: 0,
                    letterRendering: true
                },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
                pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                btn.style.display = 'block';
            }).catch(() => {
                btn.style.display = 'block';
            });
        }
    </script>
</body>
</html>
